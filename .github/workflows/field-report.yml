# Jamie's Field Report — weekly Sunday-morning digest (PRJ-20, T-193).
# Composes the week's /journey posts from the live RSS feed and sends
# via Buttondown. A quiet week sends nothing. See scripts/newsletter/.
name: field-report

on:
  schedule:
    # Sunday 11:37 UTC = 07:37 EDT / 06:37 EST — Sunday morning either way.
    - cron: '37 11 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'dry-run | draft | send'
        required: false
        default: 'dry-run'

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Compose and send the Field Report
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        # Scheduled runs do the real send; manual runs default to dry-run.
        run: node scripts/newsletter/field-report.mjs --${{ github.event_name == 'schedule' && 'send' || (github.event.inputs.mode || 'dry-run') }}
